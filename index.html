<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomX | Firebase Intelligence Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f0c29;
            --purple-main: #9d50bb;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f5f5f5;
            --green-glow: #00ff87;
            --amber-glow: #ff9f43;
            --chat-bg: rgba(15, 12, 41, 0.6);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #0f0c29 100%);
            color: var(--text); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header {
            width: 100%; padding: 20px; text-align: center;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }
        header h1 { margin: 0; font-size: 26px; letter-spacing: 2px; font-weight: 800; color: #fff; }
        
        .container { width: 95%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; width: 100%; }
        
        .relay-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 20px; 
            text-align: center; transition: all 0.3s ease; 
            cursor: pointer;
        }
        .relay-card i { font-size: 28px; margin-bottom: 10px; display: block; }
        .relay-card span { font-size: 13px; font-weight: 600; opacity: 0.8; }
        .relay-card .status { font-size: 11px; margin-top: 5px; display: block; letter-spacing: 1px; }
        
        .relay-card.ON { background: rgba(157, 80, 187, 0.2); border-color: var(--purple-main); box-shadow: 0 0 15px rgba(157, 80, 187, 0.3); }
        .relay-card.ON i { color: var(--purple-main); text-shadow: 0 0 10px var(--purple-main); }
        .relay-card.OFF { opacity: 0.6; }
        
        /* Chat Widget Styles */
        .chat-section {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 320px;
            width: 100%;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .chat-header {
            background: rgba(157, 80, 187, 0.2);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--chat-bg);
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 13px;
            line-height: 1.4;
        }
        .msg.system {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid var(--purple-main);
        }
        .msg.user {
            background: var(--purple-main);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 15px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .chat-input-area button {
            background: var(--purple-main);
            border: none;
            color: #fff;
            padding: 0 18px;
            margin-left: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .chat-input-area button:hover { background: #853fa0; }
    </style>
</head>
<body>
    <header>
        <h1>RoomX Dashboard</h1>
    </header>
    <div class="container">
        <div id="device-grid" class="grid">
            <div class="relay-card OFF"><span>Connecting Hub...</span></div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <i class="fas fa-robot" style="color: var(--purple-main)"></i> AI Intelligence Terminal
            </div>
            <div id="chat-box" class="chat-messages">
                <div class="msg system">System initialized. Try typing commands like "turn on main light" or "turn off fan".</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="cmd-input" placeholder="Type AI command here..." onkeypress="checkEnter(event)">
                <button onclick="sendAICommand()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_DB_URL = "https://homebymmzion-default-rtdb.firebaseio.com/devices.json";

        const devices = [
            { id: "relay_1", name: "Main Light", icon: "fa-lightbulb", keywords: ["main light", "light", "bulb"] },
            { id: "relay_2", name: "Dim Light", icon: "fa-moon", keywords: ["dim light", "dim", "moon"] },
            { id: "relay_3", name: "Fan", icon: "fa-fan", keywords: ["fan", "cooler"] },
            { id: "relay_4", name: "Socket", icon: "fa-plug", keywords: ["socket", "plug"] }
        ];

        let currentStates = {};
        let isUpdating = false;

        function fetchDatabase() {
            if (isUpdating) return;
            
            fetch(FIREBASE_DB_URL)
                .then(res => res.json())
                .then(data => {
                    if (!data || isUpdating) return;
                    
                    // আগের স্টেটের সাথে তুলনা করে কোনো পরিবর্তন হলে চ্যাটে লগ দেখাবে
                    devices.forEach(dev => {
                        if(currentStates[dev.id] && currentStates[dev.id] !== data[dev.id]) {
                            appendMessage(`System Log: ${dev.name} turned ${data[dev.id]} via sync.`, 'system');
                        }
                    });

                    currentStates = data;
                    renderGrid();
                })
                .catch(err => console.error("Firebase sync error:", err));
        }

        function renderGrid() {
            const grid = document.getElementById('device-grid');
            grid.innerHTML = '';

            devices.forEach(dev => {
                const state = currentStates[dev.id] || "OFF";
                let spinClass = (state === 'ON' && dev.id === 'relay_3') ? 'fa-spin' : '';
                
                grid.innerHTML += `
                    <div class="relay-card ${state}" onclick="toggleRelay('${dev.id}')">
                        <i class="fas ${dev.icon} ${spinClass}"></i>
                        <span>${dev.name}</span>
                        <span class="status">${state}</span>
                    </div>
                `;
            });
        }

        function toggleRelay(relayId, triggerSource = "UI") {
            isUpdating = true;
            
            const currentState = currentStates[relayId] || "OFF";
            const newState = currentState === "ON" ? "OFF" : "ON";
            
            currentStates[relayId] = newState;
            renderGrid();

            if(triggerSource === "UI") {
                const targetDev = devices.find(d => d.id === relayId);
                appendMessage(`System Log: ${targetDev.name} shifted to ${newState}.`, 'system');
            }

            const updateData = {};
            updateData[relayId] = newState;

            fetch(FIREBASE_DB_URL, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updateData)
            })
            .then(res => res.json())
            .then(json => {
                setTimeout(() => { isUpdating = false; }, 500);
            })
            .catch(err => {
                console.error("Failed to update Firebase:", err);
                isUpdating = false;
            });
        }

        // চ্যাট ইন্টারফেসে মেসেজ পুশ করার ফাংশন
        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function checkEnter(e) {
            if (e.key === 'Enter') sendAICommand();
        }

        // চ্যাট কমান্ড প্রসেস করার কোর এআই মেকানিজম
        function sendAICommand() {
            const input = document.getElementById('cmd-input');
            const cmd = input.value.trim().toLowerCase();
            if (!cmd) return;

            appendMessage(input.value, 'user');
            input.value = '';

            let matched = false;
            let targetState = cmd.includes("on") ? "ON" : cmd.includes("off") ? "OFF" : null;

            if (targetState) {
                for (let dev of devices) {
                    if (dev.keywords.some(keyword => cmd.includes(keyword))) {
                        matched = true;
                        const currentState = currentStates[dev.id] || "OFF";
                        
                        if (currentState === targetState) {
                            appendMessage(`AI Terminal: ${dev.name} is already ${targetState}.`, 'system');
                        } else {
                            appendMessage(`AI Terminal: Executing command to turn ${targetState} ${dev.name}...`, 'system');
                            toggleRelay(dev.id, "AI");
                        }
                        break;
                    }
                }
            }

            if (!matched) {
                appendMessage(`AI Terminal: Command not recognized. Use "turn on/off [device name]".`, 'system');
            }
        }

        setInterval(fetchDatabase, 2000);
        fetchDatabase();
    </script>
</body>
</html>
